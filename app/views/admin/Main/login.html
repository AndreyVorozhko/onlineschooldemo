<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  {{{metatags}}}
  <!-- Tell the browser to be responsive to screen width -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <base href="/{{adminname}}/">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="{{adminlte}}plugins/fontawesome-free/css/all.min.css">
  <!-- Ionicons -->
  <link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css">
  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="{{adminlte}}plugins/icheck-bootstrap/icheck-bootstrap.min.css">
  <!-- Theme style -->
  <link rel="stylesheet" href="{{adminlte}}dist/css/adminlte.min.css">
  <!-- Google Font: Source Sans Pro -->
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700" rel="stylesheet">
  <!-- My style-->
  <link rel="stylesheet" href="{{adminlte}}sly/my_style.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="login-logo">
    <a href="../../index2.html"><b>Sitelikeyou admin</b>AREA</a>
  </div>
  <!-- /.login-logo -->
  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">Sign in to start your session</p>

      <form action="main/admin-login" method="post">
        <div class="input-group mb-3">
          <input type="text" class="form-control" name="login" placeholder="Email or telephone" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-user"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" class="form-control" name="pass" placeholder="Password" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-8">
            <div class="icheck-primary">
		  <!--
              <input type="checkbox" id="remember">
              <label for="remember">
                Remember Me
              </label>
		  -->
			{{>captcha}}
			<input type="text" class="hide" name="captcha" placeholder="Введите текст с картинки">
			<input type="text" class="hide" name="addr" placeholder="Введите ваш адрес">
            </div>
          </div>
          <!-- /.col -->
          <div class="col-4">
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
          </div>
          <!-- /.col -->
        </div>
      </form>
	  <!--
      <div class="social-auth-links text-center mb-3">
        <p>- OR -</p>
        <a href="#" class="btn btn-block btn-primary">
          <i class="fab fa-facebook mr-2"></i> Sign in using Facebook
        </a>
        <a href="#" class="btn btn-block btn-danger">
          <i class="fab fa-google-plus mr-2"></i> Sign in using Google+
        </a>
      </div>
	  -->
      <!-- /.social-auth-links -->
	  <!--
      <p class="mb-1">
        <a href="forgot-password.html">I forgot my password</a>
      </p>
      <p class="mb-0">
        <a href="register.html" class="text-center">Register a new membership</a>
      </p>
	  -->
    </div>
    <!-- /.login-card-body -->
  </div>
</div>
<!-- /.login-box -->

<!-- jQuery -->
<script src="{{adminlte}}plugins/jquery/jquery.min.js"></script>
<!-- Bootstrap 4 -->
<script src="{{adminlte}}plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="{{adminlte}}dist/js/adminlte.min.js"></script>

<script>
/* Captcha for any form start */
$('[type=submit]').on('click',function(e){
	//(e.preventDefault) ? e.preventDefault() : e.returnValue = false;
	var code = e.clientX +'-'+ e.clientY;
	var cap = $('input[name=addr]');
	
	cap.attr('value', code);
	//console.log(cap.attr('value'));
	
})
/* Captcha for any form end */
</script>

</body>
</html>
