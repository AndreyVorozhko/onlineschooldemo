{{>head}}
  <!-- Croppie -->
  <link rel="stylesheet" href="/assets/croppie/croppie.min.css">
{{>header}}

  {{>sidebar}}

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0 text-dark">Редактирование пользователя</h1>
          </div><!-- /.col -->
          {{>breadcrumbs}}
        </div><!-- /.row -->
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content-header -->
    <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
		<div class="card card-info">
          <div class="card-header">
            <h3 class="card-title">Редактирование пользователя {{name}} (id={{uid}})</h3>
          </div>
          <!-- /.card-header -->
          <!-- form start -->
          <form class="form-horizontal" method="post" action="" enctype="multipart/form-data">
            <div class="card-body">
				<div class="form-group row">
					<label for="iava" class="col-sm-2 col-form-label">
						Аватарка
					</label>
					<div class="col-sm-10">
						<input type="file" class="form-control inputfile" id="iava" name="ava">
						<button type="button" id="file_reset" class="btn btn-secondary mt-3 mb-3">Удалить аватарку</button>
						<div id="preview"></div>
					</div>
              </div>
			  <input id="for-image" type="hidden" name="hava" value="">
              <div class="form-group row">
                <label for="iname" class="col-sm-2 col-form-label">Имя пользователя (как к нему обращаться)</label>
                <div class="col-sm-10">
                  <input type="text" class="form-control" id="iname" name="name" value="{{name}}">
                </div>
              </div>
			  <div class="form-group row">
                <label for="isurname" class="col-sm-2 col-form-label">Фамилия (не обязательно)</label>
                <div class="col-sm-10">
                  <input type="text" class="form-control" id="isurname" name="surname" value="{{surname}}">
                </div>
              </div>
			  <div class="form-group row">
                <label for="iemail" class="col-sm-2 col-form-label">
				Электронная почта
				<a data-toggle="collapse" href="#collapseEmail" aria-expanded="false" aria-controls="collapseAlas">
					<i class="far fa-question-circle"></i>
				</a>
				</label>
                <div class="col-sm-10">
                  <input type="text" class="form-control" id="iemail" name="email" value="{{email}}">
				  <div class="collapse" id="collapseEmail">
					  <p>После изменения электронной почты здесь, активация не требуется.</p>
				  </div>
                </div>
              </div>
			  <div class="form-group row">
                <label for="itel" class="col-sm-2 col-form-label">Телефон</label>
                <div class="col-sm-10">
                  <input type="tel" class="form-control" id="itel" name="tel" value="{{tel}}">
                </div>
              </div>
			  <p>К номеру телефона подключены:</p>
			  <div class="form-group row">
					<div class="col-sm-2"></div>
					<div class="custom-control custom-switch col-sm-10">
                      <input type="checkbox" class="custom-control-input" name="whats" id="iwhats" value="yes" {{#if_whats}}checked{{/if_whats}}>
                      <label class="custom-control-label" for="iwhats">WhatsApp</label>
                    </div>
			  </div>
			  <div class="form-group row">
					<div class="col-sm-2"></div>
					<div class="custom-control custom-switch col-sm-10">
                      <input type="checkbox" class="custom-control-input" name="viber" id="iviber" value="yes" {{#if_viber}}checked{{/if_viber}}>
                      <label class="custom-control-label" for="iviber">Viber</label>
                    </div>
			  </div>
			  <div class="form-group row">
					<div class="col-sm-2"></div>
					<div class="custom-control custom-switch col-sm-10">
                      <input type="checkbox" class="custom-control-input" name="teleg" id="iteleg" value="yes" {{#if_teleg}}checked{{/if_teleg}}>
                      <label class="custom-control-label" for="iteleg">Telegram</label>
                    </div>
			  </div>
			  <div class="form-group row">
                <label for="inewpass" class="col-sm-2 col-form-label">Новый пароль</label>
                <div class="col-sm-10">
                  <input type="password" class="form-control" id="ipass" name="newpass" placeholder="Новый пароль">
                </div>
              </div>
			  <div class="form-group row">
                <label for="inewpass2" class="col-sm-2 col-form-label">Новый пароль ещё раз</label>
                <div class="col-sm-10">
                  <input type="password" class="form-control" id="ipass" name="newpass2" placeholder="Новый пароль ещё раз">
                </div>
              </div>
			  <div class="form-group row">
                <label for="iabout" class="col-sm-2 col-form-label">Что пользователь написал о себе</label>
                <div class="col-sm-10">
					<div class="trumbowyg-dark">
						<textarea class="editor" id="iabout" name="about"></textarea>
					</div>
                </div>
              </div>
			  <div class="form-group row">
					<div class="col-sm-2"></div>
					<div class="custom-control custom-switch col-sm-10">
                      <input type="checkbox" class="custom-control-input" name="banned" id="ibanned" value="yes" {{#if_banned}}checked{{/if_banned}}>
                      <label class="custom-control-label" for="ibanned">Пользователь забанен</label>
                    </div>
			  </div>
			  <div class="form-group row">
                <label for="inotes" class="col-sm-2 col-form-label">Админская заметка о пользователе</label>
                <div class="col-sm-10">
					<div class="trumbowyg-dark">
						<textarea class="editor" id="inotes" name="notes"></textarea>
					</div>
                </div>
              </div>
            </div>
			<div class="form-group row">
					<div class="col-sm-2"></div>
					<div class="custom-control custom-switch col-sm-10">
                      <input type="checkbox" class="custom-control-input" name="activated" id="iactiv" value="yes" {{#if_activated}}checked{{/if_activated}}>
                      <label class="custom-control-label" for="iactiv">Аккаунт активирован</label>
                    </div>
			  </div>
			  <div class="form-group row">
					<div class="col-sm-2"></div>
					<div class="custom-control custom-switch col-sm-10">
                      <input type="checkbox" class="custom-control-input" name="new" id="inew" value="yes" {{#if_new}}checked{{/if_new}}>
                      <label class="custom-control-label" for="inew">Новый пользователь</label>
                    </div>
			  </div>
            <!-- /.card-body -->
            <div class="card-footer">
              <button type="submit" class="btn btn-info" name="submit" value="Применить">Применить</button>
            </div>
            <!-- /.card-footer -->
          </form>
        </div>
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content -->
  </div>
  <!-- /.content-wrapper -->

  {{>control-sidebar}}

{{>footer}}

<script>

	var blob = null;
	var xhr = new XMLHttpRequest();
	xhr.open("GET", "{{index}}upl/users/{{uid}}/ava.jpg");
	xhr.responseType = "blob";//force the HTTP response, response-type header to be blob
	xhr.onload = function()
	{
		blob = xhr.response;//xhr.response is now a blob object
		var imgblob = window.URL.createObjectURL(blob);
		$('#file_reset').show();
		crop(imgblob);
	}
	xhr.send();

</script>

<script src="/assets/trumbowyg/trumbowyg.js"></script>
<script type="/assets/text/javascript" src="trumbowyg/langs/ru.min.js"></script>
<!-- Import Trumbowyg plugins... -->
<script src="/assets/trumbowyg/plugins/upload/trumbowyg.upload.js"></script>
<script src="/assets/trumbowyg/plugins/pasteembed/trumbowyg.pasteembed.js"></script>
<script src="/assets/croppie/croppie.min.js"></script>

<script>

// New file upload form

$('#file_reset').hide();

var el = document.getElementById('preview');
var elj = $(el);

var vanilla = new Croppie(el, {
	viewport: { width: 200, height: 200, type: 'circle' },
	boundary: { width: 400, height: 400 },
	enableOrientation: true
});

elj.hide();

function crop(imgblob){
	
	elj.show();
	
	vanilla.bind({
		url: imgblob
	});
	
	document.getElementById('file_reset').addEventListener('click', function(){
		document.getElementById('iava').value = '';
		elj.hide();
		$('#file_reset').hide();
		//vanilla.destroy();
	});
	
	el.addEventListener('update', function(ev) {
		vanilla.result({type: 'base64', size: 'original', format: 'jpeg', quality: 1, circle: false}).then(function(b64) {
		// do something with cropped blob
		//console.log(b64);
		document.getElementById('for-image').value = b64;
		});
	});

}

;( function ( document, window, index )
{
    var inputs = document.querySelectorAll( '.inputfile' );
    Array.prototype.forEach.call( inputs, function( input )
    {
        var label    = input.nextElementSibling,
            labelVal = label.innerHTML;

        input.addEventListener( 'change', function( e )
        {
            var fileName = '';
            if( this.files && this.files.length > 1 )
                fileName = ( this.getAttribute( 'data-multiple-caption' ) || '' ).replace( '{count}', this.files.length );
            else
                fileName = e.target.value.split( '\\' ).pop();
			/*
            if( fileName )
                label.querySelector( 'span' ).innerHTML = fileName;
            else
                label.innerHTML = labelVal;
            */
            // Show picture before upload
            //var previ = event.target.nextElementSibling.nextElementSibling;
			var imgblob = URL.createObjectURL(event.target.files[0]);
			/*
            var newimg = document.createElement("img");
            newimg.src = URL.createObjectURL(event.target.files[0]);
            newimg.classList.add("preupl");
			
			// Remove all children from preview element
			previ.innerHTML = '';			
            previ.appendChild(newimg);
			*/
			$('#file_reset').show();
			
			crop(imgblob);
        });

        // Firefox bug fix
        input.addEventListener( 'focus', function(){ input.classList.add( 'has-focus' ); });
        input.addEventListener( 'blur', function(){ input.classList.remove( 'has-focus' ); });
    });
}( document, window, 0 ));

$('.editor').trumbowyg({
	lang: 'ru',
	autogrow: true
});

setTimeout(function() {
   $('#for-image').val('');
}, 1000);

</script>

{{>ending}}
