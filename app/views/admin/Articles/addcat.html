{{>head}}
{{>header}}

  {{>sidebar}}

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0 text-dark">Добавить категорию</h1>
          </div><!-- /.col -->
          {{>breadcrumbs}}
        </div><!-- /.row -->
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content-header -->
    <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
	  
	    <!-- Horizontal Form -->
            <div class="card card-info">
              <div class="card-header">
                <h3 class="card-title">Форма добавления новой рубрики</h3>
              </div>
              <!-- /.card-header -->
              <!-- form start -->
              <form class="form-horizontal" method="post" action="">
                <div class="card-body">
                  <div class="form-group row">
                    <label for="inputName" class="col-sm-2 col-form-label">Название</label>
                    <div class="col-sm-10">
                      <input type="text" class="form-control" id="inputName" name="title" placeholder="Название рубрики">
                    </div>
                  </div>
                  <div class="form-group row">
                    <label for="inputAlias" class="col-sm-2 col-form-label">Алиас рубрики</label>
                    <div class="col-sm-10">
                      <input type="text" class="form-control" id="inputAlias" name="alias" placeholder="Алиас рубрики">
                    </div>
                  </div>
                </div>
                <!-- /.card-body -->
                <div class="card-footer">
                  <button type="submit" name="submit" class="btn btn-info" value="Добавить новую рубрику">Добавить рубрику</button>
                </div>
                <!-- /.card-footer -->
              </form>
            </div>
            <!-- /.card -->
		
      </div>
	<!-- /.container-fluid -->
    </div>
    <!-- /.content -->
  </div>
  <!-- /.content-wrapper -->

  {{>control-sidebar}}

{{>footer}}
<script>
  $(function () {
    $('#article-list').DataTable({
      "responsive": true,
      "autoWidth": false,
    });
  });
</script>
{{>ending}}
