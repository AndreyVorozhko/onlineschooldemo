{{>head}}
{{>header}}

  {{>sidebar}}

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0 text-dark">Редактировать тариф</h1>
          </div><!-- /.col -->
          {{>breadcrumbs}}
        </div><!-- /.row -->
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content-header -->
    <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
		<div class="card card-info">
          <div class="card-header">
            <h3 class="card-title">Редактировать тариф "{{name}}" для курса "{{cname}}"</h3>
          </div>
          <!-- /.card-header -->
          <!-- form start -->
          <form class="form-horizontal" method="post" action="" enctype="multipart/form-data">
            <div class="card-body">
				<div class="form-group row">
					<label for="iname" class="col-sm-2 col-form-label">Название тарифа</label>
					<div class="col-sm-10">
					  <input type="text" class="form-control" id="iname" name="name" value="{{name}}">
					</div>
				</div>
				<div class="form-group row">
					<label for="iprice" class="col-sm-2 col-form-label">Стоимость (в рублях)</label>
					<div class="col-sm-10">
					  <input type="text" class="form-control" id="iprice" name="price" value="{{price}}">
					</div>
				</div>
				<div class="form-group row">
					<label for="reservationdate" class="col-sm-2 col-form-label">
					Дата окончания акции
					<a data-toggle="collapse" href="#collapseDate" aria-expanded="false" aria-controls="collapseDate">
						<i class="far fa-question-circle"></i>
					</a>
					</label>
					<div class="col-sm-10">
						<div class="form-group">
							<div class="input-group date" id="reservationdate" data-target-input="nearest">
								<input type="text" class="form-control datetimepicker-input" id="reservationdate" name="promodate" data-toggle="datetimepicker" data-target="#reservationdate">
							</div>
						</div>
						<div class="collapse" id="collapseDate">
						  <p>Это дата окончания акции.</p>
						  <p>Когда эта дата останется в прошлом, акция автоматически пройдет и на сайте появится обычная цена.</p>
						</div>
					</div>
				</div>
				<div class="form-group row">
					<label for="ipromoprice" class="col-sm-2 col-form-label">Стоимость по акции</label>
					<div class="col-sm-10">
					  <input type="text" class="form-control" id="ipromoprice" name="promoprice" value="{{promoprice}}">
					</div>
				</div>
                <div class="form-group row">
					<label for="imaxstudents" class="col-sm-2 col-form-label">Максимум учеников:</label>
					<div class="col-sm-10">
					  <input type="text" class="form-control" id="imaxstudents" name="lim" value="{{lim}}">
					</div>
				</div>
                <div class="form-group row">
					<div class="col-sm-2"></div>
					<div class="custom-control custom-switch col-sm-10">
                      <input type="checkbox" class="custom-control-input" name="avail" id="iavail" value="yes" {{#avail}}checked{{/avail}}>
                      <label class="custom-control-label" for="iavail">Тариф доступен</label>
                    </div>
                </div>
                
            </div>
            <!-- /.card-body -->
            <div class="card-footer">
              <button type="submit" class="btn btn-info" name="submit" value="Изменить тариф">Сохранить</button>
            </div>
            <!-- /.card-footer -->
          </form>
        </div>
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content -->
  </div>
  <!-- /.content-wrapper -->

	{{>control-sidebar}}

{{>footer}}

<script>

$(function () {
    $('#reservationdate').datetimepicker({
		defaultDate: new Date({{promodate}}),
        locale: 'ru'
    });
});

</script>

{{>ending}}
